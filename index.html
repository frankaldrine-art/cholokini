<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cholo Kini | Easy Shopping</title>
    <style>
        :root {
            --daraz-orange: #f85606;
            --bg-gray: #eff0f5;
            --white: #ffffff;
        }
        
        body { font-family: 'Roboto', sans-serif; margin: 0; background-color: var(--bg-gray); padding-bottom: 70px; }

        header { background-color: var(--daraz-orange); padding: 10px 5%; position: sticky; top: 0; z-index: 1000; }
        .search-container { display: flex; align-items: center; background: white; border-radius: 5px; padding: 5px 15px; }
        .search-container input { border: none; width: 100%; padding: 8px; outline: none; }
        
        /* Updated Brand Banner to fit your Logo */
        .brand-banner { background: white; padding: 20px 15px; text-align: center; border-bottom: 1px solid #ddd; }
        
        /* This handles your logo image */
        .brand-logo { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; /* Makes it circular like your photo */
            object-fit: cover;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .brand-banner h1 { margin: 0; font-size: 1.5rem; color: #333; }
        .brand-banner span { color: var(--daraz-orange); font-weight: bold; }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .product-card { background: var(--white); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .product-image { width: 100%; height: 160px; object-fit: cover; }
        .product-info { padding: 10px; flex-grow: 1; }
        .product-title { font-size: 0.9rem; height: 35px; overflow: hidden; margin-bottom: 5px; }
        .product-price { color: var(--daraz-orange); font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; }
        .buy-now { background: var(--daraz-orange); color: white; text-align: center; padding: 8px; text-decoration: none; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; text-decoration: none; color: #666; font-size: 0.7rem; }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); max-width: 1100px; margin: auto; }
        }
    </style>
</head>
<body>

<header>
    <div class="search-container">
        <input type="text" placeholder="Search in Cholo Kini...">
        <span style="color: #666;">🔍</span>
    </div>
</header>

<div class="brand-banner">
    <img src="logo.jpg" alt="Cholo Kini Logo" class="brand-logo">
    <h1>চলো কিনি <span>BY FAC MART</span></h1>
    <p style="font-size: 0.8rem; color: #777;">Launching March 15, 2026</p>
</div>

<div class="product-grid">
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=400" class="product-image">
        <div class="product-info">
            <div class="product-title">Premium Edition Smart Watch</div>
            <div class="product-price">৳ 2,450</div>
            <a href="https://wa.me/8801534888389?text=Buy%20Smart%20Watch" class="buy-now">ORDER NOW</a>
        </div>
    </div>
    </div>

<div class="bottom-nav">
    <a href="#" class="nav-item"><div>🏠</div>Home</a>
    <a href="https://wa.me/8801534888389" class="nav-item"><div>💬</div>Chat</a>
    <a href="#" class="nav-item"><div>🛒</div>Cart</a>
    <a href="#" class="nav-item"><div>👤</div>Account</a>
</div>

</body>
</html>
